trigger:
- main

pool:
  vmImage: ubuntu-latest

jobs:
- job: Job1
  steps:
  - script: echo Job1 script1
    displayName: 'Job1 script1'
  - script: |
      echo job1 script2
    displayName: 'job1 script2'

-  job: Job2
   steps:
     - script: echo job2 script1
       displayName: 'job2 script1'
     - script: echo job2 script2
       displayName: 'job2 script2'

